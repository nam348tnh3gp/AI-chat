<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AI Chat - GPT</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #f7f7f8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .chat-container {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .chat-header {
            background: #10a37f;
            color: white;
            padding: 1rem;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }
        .user-message {
            align-self: flex-end;
        }
        .assistant-message {
            align-self: flex-start;
        }
        .bubble {
            padding: 0.75rem 1rem;
            border-radius: 1.25rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .user-bubble {
            background: #10a37f;
            color: white;
            border-bottom-right-radius: 0.25rem;
        }
        .assistant-bubble {
            background: #e5e5ea;
            color: black;
            border-bottom-left-radius: 0.25rem;
        }
        .timestamp {
            font-size: 0.7rem;
            color: #8e8e93;
            margin-top: 0.25rem;
            margin-left: 0.5rem;
            margin-right: 0.5rem;
        }
        .chat-input-area {
            display: flex;
            padding: 1rem;
            border-top: 1px solid #ddd;
            background: white;
            gap: 0.5rem;
        }
        .chat-input-area textarea {
            flex: 1;
            border: 1px solid #ccc;
            border-radius: 1.5rem;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            resize: none;
            outline: none;
            font-family: inherit;
        }
        .chat-input-area button {
            background: #10a37f;
            border: none;
            color: white;
            font-weight: bold;
            padding: 0 1.2rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .chat-input-area button:hover {
            background: #0e8c6d;
        }
        .loading {
            font-style: italic;
            color: #666;
        }
        @media (max-width: 600px) {
            .message {
                max-width: 90%;
            }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">🤖 AI Chat (GPT-3.5)</div>
    <div class="chat-messages" id="chatMessages">
        <div class="message assistant-message">
            <div class="bubble assistant-bubble">Xin chào! Tôi là trợ lý AI. Bạn cần giúp gì hôm nay?</div>
            <div class="timestamp"></div>
        </div>
    </div>
    <div class="chat-input-area">
        <textarea id="userInput" rows="1" placeholder="Nhập tin nhắn..."></textarea>
        <button id="sendBtn">Gửi</button>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // Tự động resize textarea
    userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    // Gửi tin nhắn
    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        // Hiển thị tin nhắn của người dùng
        addMessage(message, 'user');
        userInput.value = '';
        userInput.style.height = 'auto';

        // Hiển thị trạng thái đang tải
        const loadingDiv = addLoadingMessage();

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: message })
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            if (data.error) throw new Error(data.error);

            // Xóa loading và thêm câu trả lời thật
            loadingDiv.remove();
            addMessage(data.reply, 'assistant');
        } catch (error) {
            loadingDiv.remove();
            addMessage('❌ Lỗi: ' + error.message, 'assistant');
        }
    }

    function addMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender === 'user' ? 'user-message' : 'assistant-message'}`;
        
        const bubble = document.createElement('div');
        bubble.className = `bubble ${sender === 'user' ? 'user-bubble' : 'assistant-bubble'}`;
        bubble.textContent = text;
        
        const timestamp = document.createElement('div');
        timestamp.className = 'timestamp';
        timestamp.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
        
        messageDiv.appendChild(bubble);
        messageDiv.appendChild(timestamp);
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return messageDiv;
    }

    function addLoadingMessage() {
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message assistant-message';
        const bubble = document.createElement('div');
        bubble.className = 'bubble assistant-bubble loading';
        bubble.textContent = 'Đang suy nghĩ...';
        loadingDiv.appendChild(bubble);
        chatMessages.appendChild(loadingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return loadingDiv;
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>
</body>
</html>
