<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini AI Chat - Miễn phí</title>
    <style>
        * { box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { margin: 0; background: #f9fafb; }
        .chat-container { max-width: 800px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: white; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
        .chat-header { background: #1a73e8; color: white; padding: 1rem; text-align: center; font-weight: bold; font-size: 1.2rem; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 1rem; }
        .message { display: flex; flex-direction: column; max-width: 85%; }
        .user-message { align-self: flex-end; }
        .assistant-message { align-self: flex-start; }
        .bubble { padding: 0.75rem 1rem; border-radius: 1.25rem; line-height: 1.4; word-wrap: break-word; }
        .user-bubble { background: #1a73e8; color: white; border-bottom-right-radius: 0.25rem; }
        .assistant-bubble { background: #e5e5ea; color: black; border-bottom-left-radius: 0.25rem; }
        .timestamp { font-size: 0.7rem; color: #8e8e93; margin-top: 0.25rem; margin-left: 0.5rem; margin-right: 0.5rem; }
        .loading { font-style: italic; color: #666; }
        .chat-input-area { display: flex; padding: 1rem; border-top: 1px solid #ddd; gap: 0.5rem; background: white; }
        textarea { flex: 1; border: 1px solid #ccc; border-radius: 1.5rem; padding: 0.75rem 1rem; font-size: 1rem; resize: none; outline: none; font-family: inherit; }
        button { background: #1a73e8; border: none; color: white; font-weight: bold; padding: 0 1.5rem; border-radius: 2rem; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0d5bbd; }
        @media (max-width: 600px) { .message { max-width: 90%; } }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">✨ Gemini AI Chat (Miễn phí)</div>
    <div class="chat-messages" id="chatMessages">
        <div class="message assistant-message">
            <div class="bubble assistant-bubble">Xin chào! Tôi là Gemini, trợ lý AI của Google. Bạn cần giúp gì?</div>
            <div class="timestamp"></div>
        </div>
    </div>
    <div class="chat-input-area">
        <textarea id="userInput" rows="1" placeholder="Nhập tin nhắn... (Shift+Enter xuống dòng, Enter gửi)"></textarea>
        <button id="sendBtn">Gửi</button>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    
    // Lưu lịch sử chat để gửi lên server (giữ context)
    let conversationHistory = [
        { role: 'model', content: 'Xin chào! Tôi là Gemini, trợ lý AI của Google. Bạn cần giúp gì?' }
    ];

    // Tự động resize textarea
    userInput.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    async function sendMessage() {
        const message = userInput.value.trim();
        if (!message) return;

        // Thêm tin nhắn user vào UI và lịch sử
        addMessage(message, 'user');
        conversationHistory.push({ role: 'user', content: message });
        userInput.value = '';
        userInput.style.height = 'auto';

        // Hiển thị loading
        const loadingDiv = addLoadingMessage();

        try {
            // Gửi lịch sử (không gửi toàn bộ nếu quá dài, có thể giới hạn)
            // Lấy 10 tin nhắn gần nhất để tránh quá token
            const recentHistory = conversationHistory.slice(-10);
            
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: message,
                    history: recentHistory.slice(0, -1) // lịch sử trước tin nhắn hiện tại
                })
            });

            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data.error) throw new Error(data.error);

            loadingDiv.remove();
            addMessage(data.reply, 'assistant');
            conversationHistory.push({ role: 'model', content: data.reply });
        } catch (error) {
            loadingDiv.remove();
            addMessage(`❌ Lỗi: ${error.message}`, 'assistant');
            // Xóa tin nhắn user khỏi lịch sử nếu lỗi (tuỳ chọn)
            conversationHistory.pop();
        }
    }

    function addMessage(text, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender === 'user' ? 'user-message' : 'assistant-message'}`;
        
        const bubble = document.createElement('div');
        bubble.className = `bubble ${sender === 'user' ? 'user-bubble' : 'assistant-bubble'}`;
        // Hiển thị text thuần (có thể parse markdown nếu muốn)
        bubble.textContent = text;
        
        const timestamp = document.createElement('div');
        timestamp.className = 'timestamp';
        timestamp.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute:'2-digit' });
        
        messageDiv.appendChild(bubble);
        messageDiv.appendChild(timestamp);
        chatMessages.appendChild(messageDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return messageDiv;
    }

    function addLoadingMessage() {
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message assistant-message';
        const bubble = document.createElement('div');
        bubble.className = 'bubble assistant-bubble loading';
        bubble.textContent = 'Gemini đang suy nghĩ...';
        loadingDiv.appendChild(bubble);
        chatMessages.appendChild(loadingDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        return loadingDiv;
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // Optional: Clear history button (có thể thêm sau)
</script>
</body>
</html>
